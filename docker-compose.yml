version: "3.8"

services:

  mongo-user:
    image: mongo
    ports:
      - "27017:27017"

  mongo-product:
    image: mongo
    ports:
      - "27018:27017"

  mongo-order:
    image: mongo
    ports:
      - "27019:27017"

  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
    depends_on:
      - mongo-user
    restart: always

  product-service:
    build: ./product-service
    ports:
      - "3002:3002"
    depends_on:
      - mongo-product
    restart: always

  payment-service:
    build: ./payment-service
    ports:
      - "3004:3004"
    restart: always

  order-service:
    build: ./order-service
    ports:
      - "3003:3003"
    depends_on:
      - mongo-order
      - product-service
      - payment-service
    restart: always