apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-product
  namespace: project4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-product
  template:
    metadata:
      labels:
        app: mongo-product
    spec:
      containers:
      - name: mongo
        image: mongo
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-product
  namespace: project4
spec:
  selector:
    app: mongo-product
  ports:
  - port: 27017
    targetPort: 27017