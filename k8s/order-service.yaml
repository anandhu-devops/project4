apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: project4
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: anandhukdevops/order-service
          ports:
            - containerPort: 3003
          env:
            - name: MONGO_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MONGO_ORDER_URL
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: project4
spec:
  selector:
    app: order-service
  ports:
    - port: 3003
      targetPort: 3003